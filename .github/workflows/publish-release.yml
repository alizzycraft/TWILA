name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Extract version from tag
        id: get_version
        run: |
          # Remove 'v' prefix from tag (e.g., v1.0.0-beta -> 1.0.0-beta)
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"
      
      - name: Install TypeScript
        run: npm install -g typescript
      
      - name: Build TypeScript
        run: tsc --project ./tsconfig.json
      
      - name: Build JAR
        run: gradle build -x compileTypeScript -Pversion=${{ steps.get_version.outputs.version }}
      
      - name: Cleanup intermediate JARs
        run: rm -f build/libs/*-sources.jar
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/twila-*.jar
          prerelease: true
          generate_release_notes: true
          name: Twila ${{ github.ref_name }} (Beta)
          body: |
            ## Twila Minecraft Mod
            
            This is a beta release of the Twila mod.
            
            ### Installation
            1. Download the `twila-*.jar` file.
            2. Place it in your Minecraft `mods` folder.
            3. Ensure you have the Fabric Loader, Fabric API, and Tapestry installed for Minecraft 1.21.11.
            
            ### Requirements
            - Minecraft 1.21.11
            - Fabric Loader 0.15.11+
            - Fabric API 0.100.1+1.21.11
            - Tapestry 1.0.0
